<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hello World</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f7f4ed;
      --muted: #b8c2ca;
      --line: rgba(255, 255, 255, 0.18);
      --panel: rgba(15, 22, 31, 0.76);
      --teal: #4de0c8;
      --coral: #ff8a6a;
      --gold: #ffd166;
      --night: #091018;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 18% 24%, rgba(77, 224, 200, 0.26), transparent 28rem),
        radial-gradient(circle at 82% 72%, rgba(255, 138, 106, 0.28), transparent 30rem),
        linear-gradient(135deg, #07111d 0%, #142132 44%, #1e1522 100%);
      color: var(--ink);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.055) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent);
      pointer-events: none;
    }

    main {
      width: min(92vw, 860px);
      padding: clamp(2rem, 6vw, 5rem);
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--panel);
      box-shadow: 0 34px 120px rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(24px);
      position: relative;
      isolation: isolate;
    }

    main::after {
      content: "";
      position: absolute;
      inset: 16px;
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 20px;
      pointer-events: none;
      z-index: -1;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      margin: 0 0 1.2rem;
      color: var(--gold);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 0.72rem;
      height: 0.72rem;
      border-radius: 999px;
      background: var(--teal);
      box-shadow: 0 0 26px var(--teal);
    }

    h1 {
      margin: 0;
      max-width: 10ch;
      font-size: clamp(4rem, 13vw, 9.5rem);
      line-height: 0.88;
      letter-spacing: 0;
    }

    h1 span {
      display: block;
      color: transparent;
      background: linear-gradient(90deg, var(--teal), var(--gold), var(--coral));
      -webkit-background-clip: text;
      background-clip: text;
    }

    p {
      max-width: 56ch;
      margin: 1.5rem 0 0;
      color: var(--muted);
      font-size: clamp(1.05rem, 2vw, 1.25rem);
      line-height: 1.7;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.9rem;
      margin-top: 2rem;
    }

    a {
      display: inline-flex;
      min-height: 3rem;
      align-items: center;
      justify-content: center;
      padding: 0 1.1rem;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 999px;
      color: var(--ink);
      text-decoration: none;
      font-weight: 800;
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
    }

    a:first-child {
      background: var(--ink);
      color: var(--night);
    }

    a:hover {
      transform: translateY(-3px);
      border-color: rgba(255, 255, 255, 0.5);
      background: rgba(255, 255, 255, 0.12);
    }

    a:first-child:hover {
      background: linear-gradient(90deg, var(--teal), var(--gold));
    }

    .spark {
      position: absolute;
      width: 8rem;
      aspect-ratio: 1;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 32% 68% 53% 47% / 45% 33% 67% 55%;
      animation: drift 8s ease-in-out infinite alternate;
      pointer-events: none;
    }

    .spark.one {
      right: 7%;
      top: 13%;
      background: rgba(77, 224, 200, 0.14);
    }

    .spark.two {
      right: 18%;
      bottom: 12%;
      width: 4.5rem;
      background: rgba(255, 138, 106, 0.14);
      animation-delay: -2s;
    }

    @keyframes drift {
      from {
        transform: translate3d(0, -10px, 0) rotate(0deg);
      }

      to {
        transform: translate3d(12px, 16px, 0) rotate(18deg);
      }
    }

    @media (max-width: 620px) {
      body {
        overflow: auto;
      }

      main {
        border-radius: 20px;
      }

      .spark {
        opacity: 0.5;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="spark one" aria-hidden="true"></div>
    <div class="spark two" aria-hidden="true"></div>
    <p class="eyebrow">First transmission</p>
    <h1>Hello <span>World.</span></h1>
    <p>
      A tiny page with a little polish: glassy depth, glowing color, and a calm
      midnight backdrop. Not bad for two words.
    </p>
    <div class="actions" aria-label="Page actions">
      <a href="#" onclick="event.preventDefault()">Say hello</a>
      <a href="#" onclick="event.preventDefault()">Explore</a>
    </div>
  </main>
</body>
</html>
